services:
  app:
    build: .
    entrypoint: ["make", "test"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - POSTGRES_HOST=postgres
    volumes:
      - .:/app
      - build_cache:/app/_build

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       workforce
      POSTGRES_USER:     wt
      POSTGRES_PASSWORD: secret
    volumes:
      - ./priv/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "wt"]
      interval: 5s
      retries: 10

volumes:
  build_cache: